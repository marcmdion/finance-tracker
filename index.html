<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Strategist Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts & Dependencies -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>

    <!-- Firebase Import Map -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            }
        }
    </script>

    <style>
        /* Base shadcn typography & resets */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #0f172a; }
        
        /* Custom scrollbar for minimalist look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Loader */
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-left-color: #0f172a; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "firebase/auth";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "firebase/firestore";

        // ==========================================
        // FIREBASE CONFIGURATION PLACEHOLDER
        // ==========================================
        const defaultUserConfig = {
            apiKey: "AIzaSyBoXFpkoQvANb68vMpnksdrlnLkCSrpuDU",
            authDomain: "finance-tracker-27d5f.firebaseapp.com",
            projectId: "finance-tracker-27d5f",
            storageBucket: "finance-tracker-27d5f.firebasestorage.app",
            messagingSenderId: "663637652591",
            appId: "1:663637652591:web:964666791865943d6b899a",
            measurementId: "G-GCLL7V05G4"
        };

        // FORCE the app to use YOUR configuration
        const firebaseConfig = defaultUserConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Recharts Components (Updated for Sankey)
        const { ResponsiveContainer, Sankey, Tooltip } = window.Recharts;
        const CHART_COLORS = [
            '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e', 
            '#14b8a6', '#06b6d4', '#3b82f6', '#6366f1', '#8b5cf6', 
            '#d946ef', '#ec4899'
        ];

        // Icons
        const Icons = {
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
            TrendingUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
            TrendingDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#dc2626" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        };

        // UI Components
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white border border-gray-200 rounded-xl shadow-sm ${className}`}>{children}</div>
        );

        const DEFAULT_CATEGORIES = [
            "House", "House Rates", "House Insurance", "Personal Insurance", 
            "Car Insurance", "Food/Groceries", "Eat Out", "Power", "Transport", 
            "Maintenance", "Personal Care/Meds", "Entertainment", "Laundromat", 
            "Basketball", "Haircut", "Internet", "Clothing"
        ];

        // Auth Screen Component
        const AuthScreen = ({ auth }) => {
            const [isLogin, setIsLogin] = React.useState(true);
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');
            const [isLoading, setIsLoading] = React.useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsLoading(true);
                try {
                    if (isLogin) {
                        await signInWithEmailAndPassword(auth, email, password);
                    } else {
                        await createUserWithEmailAndPassword(auth, email, password);
                    }
                } catch (err) {
                    let friendlyError = err.message;
                    if (err.code === 'auth/email-already-in-use') {
                        friendlyError = "This email is already registered. Please switch to 'Sign In' below.";
                    } else if (err.code === 'auth/invalid-credential') {
                        friendlyError = "Incorrect email or password.";
                    }
                    setError(friendlyError);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <Card className="w-full max-w-md p-8 space-y-6">
                        <div className="text-center">
                            <h1 className="text-2xl font-bold text-gray-900">{isLogin ? 'Welcome Back' : 'Create Account'}</h1>
                            <p className="text-sm text-gray-500 mt-1">Finance Strategist Dashboard</p>
                        </div>
                        
                        {error && <div className="p-3 bg-red-50 text-red-700 text-sm rounded-md border border-red-200">{error}</div>}

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="space-y-2">
                                <label className="text-sm font-medium text-gray-700">Email</label>
                                <input 
                                    type="email" required
                                    value={email} onChange={(e) => setEmail(e.target.value)}
                                    className="flex h-10 w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                                />
                            </div>
                            <div className="space-y-2">
                                <label className="text-sm font-medium text-gray-700">Password</label>
                                <input 
                                    type="password" required minLength="6"
                                    value={password} onChange={(e) => setPassword(e.target.value)}
                                    className="flex h-10 w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
                                />
                            </div>
                            <button 
                                type="submit" disabled={isLoading}
                                className="w-full inline-flex items-center justify-center rounded-md text-sm font-medium bg-gray-900 text-white hover:bg-gray-800 h-10 py-2 disabled:opacity-50 transition-colors"
                            >
                                {isLoading ? 'Please wait...' : (isLogin ? 'Sign In' : 'Sign Up')}
                            </button>
                        </form>
                        
                        <div className="text-center text-sm text-gray-500">
                            {isLogin ? "Don't have an account? " : "Already have an account? "}
                            <button onClick={() => setIsLogin(!isLogin)} className="text-gray-900 font-medium hover:underline">
                                {isLogin ? 'Sign Up' : 'Sign In'}
                            </button>
                        </div>
                    </Card>
                </div>
            );
        };

        // Custom Node for Sankey Chart
        const CustomSankeyNode = ({ x, y, width, height, index, payload }) => {
            const isRightSide = x > 150;
            return (
                <g>
                    <rect x={x} y={y} width={width} height={Math.max(height, 2)} fill={CHART_COLORS[index % CHART_COLORS.length]} rx="2" />
                    <text
                        textAnchor={isRightSide ? 'end' : 'start'}
                        x={isRightSide ? x - 6 : x + width + 6}
                        y={y + height / 2}
                        fontSize="12"
                        fontWeight="500"
                        fill="#334155"
                        dominantBaseline="middle"
                    >
                        {payload.name}
                    </text>
                </g>
            );
        };

        const getCycleDates = (monthOffset = 0) => {
            const today = new Date();
            const currentDay = today.getDate();
            const baseStartMonth = currentDay >= 20 ? today.getMonth() : today.getMonth() - 1;
            const start = new Date(today.getFullYear(), baseStartMonth + monthOffset, 20);
            const end = new Date(today.getFullYear(), baseStartMonth + monthOffset + 1, 19, 23, 59, 59, 999);
            return { start, end };
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [transactions, setTransactions] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [isSubmitting, setIsSubmitting] = React.useState(false);
            const [cycleOffset, setCycleOffset] = React.useState(0);
            const [syncError, setSyncError] = React.useState(false); // Track DB permission errors
            
            const getTodayString = () => new Date().toISOString().split('T')[0];
            const initialFormState = { type: 'expense', amount: '', name: '', category: '', date: getTodayString() };
            const [formData, setFormData] = React.useState(initialFormState);

            const availableCategories = React.useMemo(() => {
                const dynamicCategories = transactions.map(t => t.category).filter(Boolean);
                return Array.from(new Set([...DEFAULT_CATEGORIES, ...dynamicCategories])).sort();
            }, [transactions]);

            React.useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!user) return;

                const txPath = collection(db, 'users', user.uid, 'transactions');

                const unsubscribe = onSnapshot(txPath, 
                    (snapshot) => {
                        setSyncError(false); // Clear error on successful read
                        const data = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        data.sort((a, b) => b.createdAt - a.createdAt);
                        setTransactions(data);
                        setLoading(false);
                    },
                    (error) => {
                        console.error("Firestore sync error:", error);
                        if (error.code === 'permission-denied' || error.message.includes('permission')) {
                            setSyncError(true);
                        }
                        setLoading(false);
                    }
                );

                return () => unsubscribe();
            }, [user]);

            const handleNameChange = (e) => {
                const newName = e.target.value;
                setFormData(prev => ({ ...prev, name: newName }));

                if (newName.trim().length >= 2) {
                    const match = transactions.find(t => 
                        t.type === formData.type && 
                        t.name.toLowerCase() === newName.toLowerCase()
                    );
                    if (match && match.category) {
                        setFormData(prev => ({ ...prev, category: match.category }));
                    }
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user || !formData.amount || !formData.name || !formData.category || !formData.date) return;
                
                setIsSubmitting(true);
                try {
                    const txPath = collection(db, 'users', user.uid, 'transactions');
                    const [year, month, day] = formData.date.split('-');
                    const txDate = new Date(year, month - 1, day).getTime();

                    await addDoc(txPath, {
                        type: formData.type,
                        amount: parseFloat(formData.amount),
                        name: formData.name,
                        category: formData.category,
                        date: formData.date,
                        createdAt: txDate
                    });
                    setFormData({ ...initialFormState, date: getTodayString() });
                } catch (error) {
                    console.error("Error adding transaction:", error);
                    if (error.code === 'permission-denied') setSyncError(true);
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleDelete = async (id) => {
                if (!user) return;
                try {
                    const docRef = doc(db, 'users', user.uid, 'transactions', id);
                    await deleteDoc(docRef);
                } catch (error) {
                    console.error("Error deleting transaction:", error);
                    if (error.code === 'permission-denied') setSyncError(true);
                }
            };

            const cycleDates = React.useMemo(() => getCycleDates(cycleOffset), [cycleOffset]);
            
            const currentCycleTransactions = React.useMemo(() => {
                const startTs = cycleDates.start.getTime();
                const endTs = cycleDates.end.getTime();
                return transactions.filter(t => t.createdAt >= startTs && t.createdAt <= endTs);
            }, [transactions, cycleDates]);

            const totalIncome = currentCycleTransactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const totalExpenses = currentCycleTransactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const netBalance = totalIncome - totalExpenses;

            const sankeyData = React.useMemo(() => {
                if (totalIncome === 0 && totalExpenses === 0) return null;

                const nodes = [];
                const links = [];
                const nodeMap = new Map();

                const addNode = (name) => {
                    if (!nodeMap.has(name)) {
                        nodeMap.set(name, nodes.length);
                        nodes.push({ name });
                    }
                    return nodeMap.get(name);
                };

                const budgetId = addNode('Total Budget ');

                if (totalIncome > 0) {
                    const incomeId = addNode('Income ');
                    links.push({ source: incomeId, target: budgetId, value: totalIncome });
                }

                if (netBalance < 0) {
                    const deficitId = addNode('Overspend ');
                    links.push({ source: deficitId, target: budgetId, value: Math.abs(netBalance) });
                }

                const expensesByCategory = currentCycleTransactions
                    .filter(t => t.type === 'expense')
                    .reduce((acc, t) => {
                        acc[t.category] = (acc[t.category] || 0) + t.amount;
                        return acc;
                    }, {});

                Object.entries(expensesByCategory).forEach(([category, amount]) => {
                    if (amount > 0) {
                        const catId = addNode(category);
                        links.push({ source: budgetId, target: catId, value: amount });
                    }
                });

                if (netBalance > 0) {
                    const savingsId = addNode('Savings ');
                    links.push({ source: budgetId, target: savingsId, value: netBalance });
                }

                return { nodes, links };
            }, [currentCycleTransactions, totalIncome, totalExpenses, netBalance]);

            if (loading) return <div className="min-h-screen flex items-center justify-center"><div className="spinner"></div></div>;

            if (!user) return <AuthScreen auth={auth} />;

            // If Firebase denies read/write permissions, show the exact fix
            if (syncError) {
                return (
                    <div className="min-h-screen p-4 sm:p-6 flex items-center justify-center bg-gray-50">
                        <Card className="w-full max-w-2xl p-8 border-red-200 bg-red-50 shadow-md">
                            <div className="flex items-start space-x-3">
                                <svg className="w-6 h-6 text-red-600 mt-1 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                                <div>
                                    <h2 className="text-xl font-bold text-red-800 mb-2">Database Permission Denied</h2>
                                    <p className="text-sm text-red-700 mb-6">
                                        You successfully logged in, but your Firebase database rules are actively blocking you from reading or saving data. You must update your Firestore rules to allow authenticated users to modify their own data.
                                    </p>
                                    
                                    <div className="bg-white rounded-lg p-5 border border-red-100 shadow-sm">
                                        <p className="text-sm font-semibold text-gray-900 mb-3">How to fix it in 3 steps:</p>
                                        <ol className="list-decimal pl-5 text-sm text-gray-700 space-y-2 mb-4">
                                            <li>Go to the <a href="https://console.firebase.google.com/" target="_blank" className="text-blue-600 hover:underline font-medium">Firebase Console</a> and open <strong>finance-tracker-27d5f</strong></li>
                                            <li>Click <strong>Firestore Database</strong> on the left, then click the <strong>Rules</strong> tab at the top.</li>
                                            <li>Erase everything in the text box, paste the exact code below, and click <strong>Publish</strong>:</li>
                                        </ol>
                                        
                                        <div className="relative">
                                            <pre className="bg-gray-900 text-gray-100 p-4 rounded-md text-xs overflow-x-auto">
{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /users/{userId}/transactions/{document=**} {
      allow read, write: if request.auth != null && request.auth.uid == userId;
    }
  }
}`}
                                            </pre>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-6">
                                        <button 
                                            onClick={() => window.location.reload()} 
                                            className="px-5 py-2.5 bg-red-700 text-white text-sm font-medium rounded-md hover:bg-red-800 transition-colors shadow-sm"
                                        >
                                            I've updated the rules, reload app
                                        </button>
                                        <button 
                                            onClick={() => signOut(auth)} 
                                            className="ml-4 px-5 py-2.5 bg-transparent border border-red-300 text-red-700 text-sm font-medium rounded-md hover:bg-red-100 transition-colors"
                                        >
                                            Logout
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </Card>
                    </div>
                );
            }

            const formatDateStr = (date) => date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });

            return (
                <div className="min-h-screen p-4 sm:p-6 lg:p-8 max-w-6xl mx-auto space-y-6">
                    {/* Header */}
                    <div className="flex flex-col space-y-3 sm:flex-row sm:items-center sm:justify-between sm:space-y-0">
                        <div className="flex flex-col space-y-1">
                            <h1 className="text-3xl font-bold tracking-tight text-gray-900">Finance Strategist</h1>
                            <p className="text-sm text-gray-500">Radical visibility into your real-time cash flow.</p>
                        </div>
                        <div className="flex items-center space-x-4">
                            <div className="inline-flex items-center rounded-full border border-gray-200 bg-white shadow-sm p-1">
                                <button 
                                    onClick={() => setCycleOffset(prev => prev - 1)} 
                                    className="p-1.5 text-gray-500 hover:text-gray-900 rounded-full hover:bg-gray-100 transition-colors"
                                    title="Previous Cycle"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                                </button>
                                <span className="text-sm font-medium px-3 text-gray-700 min-w-[160px] text-center">
                                    {formatDateStr(cycleDates.start)} - {formatDateStr(cycleDates.end)}
                                </span>
                                <button 
                                    onClick={() => setCycleOffset(prev => prev + 1)} 
                                    className="p-1.5 text-gray-500 hover:text-gray-900 rounded-full hover:bg-gray-100 transition-colors"
                                    title="Next Cycle"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                                </button>
                                {cycleOffset !== 0 && (
                                    <button 
                                        onClick={() => setCycleOffset(0)} 
                                        className="ml-2 text-xs font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 px-3 py-1.5 rounded-full transition-colors"
                                    >
                                        Current
                                    </button>
                                )}
                            </div>
                            <button 
                                onClick={() => signOut(auth)}
                                className="text-sm font-medium text-gray-500 hover:text-red-600 transition-colors px-2"
                            >
                                Logout
                            </button>
                        </div>
                    </div>

                    {/* Summary Cards */}
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <Card className="p-6 flex flex-col justify-between space-y-2">
                            <div className="flex items-center justify-between text-sm font-medium text-gray-500">
                                <span>Total Income</span>
                                <Icons.TrendingUp />
                            </div>
                            <div className="text-3xl font-bold text-gray-900">${totalIncome.toFixed(2)}</div>
                        </Card>
                        <Card className="p-6 flex flex-col justify-between space-y-2">
                            <div className="flex items-center justify-between text-sm font-medium text-gray-500">
                                <span>Total Expenses</span>
                                <Icons.TrendingDown />
                            </div>
                            <div className="text-3xl font-bold text-gray-900">${totalExpenses.toFixed(2)}</div>
                        </Card>
                        <Card className="p-6 flex flex-col justify-between space-y-2 bg-gray-900 text-white border-transparent">
                            <div className="flex items-center justify-between text-sm font-medium text-gray-300">
                                <span>Net Balance</span>
                                <Icons.Wallet />
                            </div>
                            <div className="text-3xl font-bold">${netBalance.toFixed(2)}</div>
                        </Card>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Input Form */}
                        <Card className="p-6 lg:col-span-1">
                            <h2 className="text-lg font-semibold mb-4 text-gray-900">Record Transaction</h2>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-gray-700">Date</label>
                                    <input 
                                        type="date" required
                                        value={formData.date}
                                        onChange={(e) => setFormData({...formData, date: e.target.value})}
                                        className="flex h-10 w-full rounded-md border border-gray-300 bg-transparent px-3 py-2 text-sm placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-1 transition-all"
                                    />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-gray-700">Type</label>
                                    <select 
                                        value={formData.type}
                                        onChange={(e) => setFormData({...formData, type: e.target.value})}
                                        className="flex h-10 w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-1 transition-all"
                                    >
                                        <option value="expense">Expense</option>
                                        <option value="income">Income</option>
                                    </select>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-gray-700">Amount</label>
                                    <div className="relative">
                                        <span className="absolute left-3 top-2.5 text-gray-500 text-sm">$</span>
                                        <input 
                                            type="number" step="0.01" required min="0"
                                            value={formData.amount}
                                            onChange={(e) => setFormData({...formData, amount: e.target.value})}
                                            className="flex h-10 w-full rounded-md border border-gray-300 bg-transparent pl-7 pr-3 py-2 text-sm placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-1 transition-all"
                                            placeholder="0.00"
                                        />
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-gray-700">Name / Merchant</label>
                                    <input 
                                        type="text" required
                                        value={formData.name}
                                        onChange={handleNameChange}
                                        className="flex h-10 w-full rounded-md border border-gray-300 bg-transparent px-3 py-2 text-sm placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-1 transition-all"
                                        placeholder="e.g. Netflix, Grocery Store"
                                    />
                                    <p className="text-[11px] text-gray-500">Auto-categorizes based on past entries.</p>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-gray-700">Category</label>
                                    <input 
                                        type="text" required
                                        list="category-options"
                                        value={formData.category}
                                        onChange={(e) => setFormData({...formData, category: e.target.value})}
                                        className="flex h-10 w-full rounded-md border border-gray-300 bg-transparent px-3 py-2 text-sm placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-1 transition-all"
                                        placeholder="e.g. Entertainment, Groceries"
                                    />
                                    <datalist id="category-options">
                                        {availableCategories.map(cat => (
                                            <option key={cat} value={cat} />
                                        ))}
                                    </datalist>
                                </div>
                                <button 
                                    type="submit" 
                                    disabled={isSubmitting}
                                    className="w-full inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-900 bg-gray-900 text-white hover:bg-gray-800 h-10 py-2 px-4 disabled:opacity-50 mt-2"
                                >
                                    {isSubmitting ? 'Saving...' : 'Add Transaction'}
                                </button>
                            </form>
                        </Card>

                        {/* Visualization */}
                        <Card className="p-6 lg:col-span-2 flex flex-col">
                            <h2 className="text-lg font-semibold mb-6 text-gray-900">Expense Allocation (Current Cycle)</h2>
                            <div className="flex-grow w-full min-h-[300px]">
                                {sankeyData ? (
                                    <ResponsiveContainer width="100%" height="100%">
                                        <Sankey
                                            data={sankeyData}
                                            node={<CustomSankeyNode />}
                                            margin={{ top: 20, bottom: 20, left: 60, right: 60 }}
                                            link={{ stroke: '#cbd5e1', strokeOpacity: 0.4 }}
                                        >
                                            <Tooltip 
                                                formatter={(value) => `$${value.toFixed(2)}`}
                                                contentStyle={{ borderRadius: '8px', border: '1px solid #e2e8f0', boxShadow: '0 1px 2px 0 rgb(0 0 0 / 0.05)' }}
                                            />
                                        </Sankey>
                                    </ResponsiveContainer>
                                ) : (
                                    <div className="h-full flex items-center justify-center text-sm text-gray-500 border-2 border-dashed border-gray-200 rounded-lg">
                                        No expense data available to visualize for this cycle.
                                    </div>
                                )}
                            </div>
                        </Card>
                    </div>

                    {/* Transaction History */}
                    <Card className="overflow-hidden">
                        <div className="p-6 border-b border-gray-200">
                            <h2 className="text-lg font-semibold text-gray-900">Transactions (Current Cycle)</h2>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead className="text-xs text-gray-500 uppercase bg-gray-50/50 border-b border-gray-200">
                                    <tr>
                                        <th className="px-6 py-3 font-medium">Name</th>
                                        <th className="px-6 py-3 font-medium">Category</th>
                                        <th className="px-6 py-3 font-medium">Date</th>
                                        <th className="px-6 py-3 font-medium text-right">Amount</th>
                                        <th className="px-6 py-3 font-medium w-16"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {currentCycleTransactions.length === 0 ? (
                                        <tr><td colSpan="5" className="px-6 py-8 text-center text-gray-500">No transactions recorded in this cycle.</td></tr>
                                    ) : (
                                        currentCycleTransactions.map((tx) => (
                                            <tr key={tx.id} className="border-b border-gray-100 hover:bg-gray-50/50 transition-colors">
                                                <td className="px-6 py-4 font-medium text-gray-900">{tx.name}</td>
                                                <td className="px-6 py-4 text-gray-600">
                                                    <span className="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium bg-gray-100 text-gray-700">
                                                        {tx.category}
                                                    </span>
                                                </td>
                                                <td className="px-6 py-4 text-gray-500">
                                                    {new Date(tx.createdAt).toLocaleDateString()}
                                                </td>
                                                <td className={`px-6 py-4 text-right font-medium ${tx.type === 'income' ? 'text-green-600' : 'text-gray-900'}`}>
                                                    {tx.type === 'income' ? '+' : '-'}${tx.amount.toFixed(2)}
                                                </td>
                                                <td className="px-6 py-4">
                                                    <button 
                                                        onClick={() => handleDelete(tx.id)}
                                                        className="text-gray-400 hover:text-red-600 transition-colors p-1 rounded-md hover:bg-red-50"
                                                        title="Delete transaction"
                                                    >
                                                        <Icons.Trash />
                                                    </button>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </Card>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
